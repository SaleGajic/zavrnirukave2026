<!doctype html>
<html lang="sr">
<head>
<meta charset="utf-8">
<title>Zavrni Rukave #14 — lokacije</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;top:12px;left:12px;z-index:1000;background:#fff;
    padding:10px 12px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.15);
    font-size:13px;max-width:280px}
  .panel h1{font-size:14px;margin:0 0 6px;display:flex;align-items:center;gap:8px}
  .panel .muted{color:#666;font-size:11px;margin-bottom:8px}
  .panel label{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .pop{font-size:13px;line-height:1.35}
  .pop b{display:block;margin-bottom:2px}
  .pop .small{color:#666;font-size:11px}
  .chip{font-size:10.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
    padding:2px 6px;border-radius:10px;display:inline-block;cursor:pointer;user-select:none}
  .chip.cache{background:#fff3cd;color:#7a5c00;border:1px solid #ffe48a}
  .chip.live{background:#d4f1d6;color:#1c5d22;border:1px solid #95d99a}
  .chip.err{background:#fde2e1;color:#7a1f1c;border:1px solid #f5b3b0}
  .chip.loading{background:#e6e8eb;color:#444;border:1px solid #d0d3d6}
  .stamp{color:#888;font-size:10.5px;margin-left:auto}
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>
    <span>Zavrni Rukave #14</span>
    <span id="chip" class="chip loading" title="Klik za ručno osvežavanje">…</span>
  </h1>
  <div class="muted">10. maj 2026 · <span id="count">…</span> lokacija · klik na pin za detalje</div>
  <div id="filters"></div>
  <div class="muted" style="margin-top:6px;display:flex">
    <span>Izvor: <a href="https://zavrnirukave.rs/prijavljene-lokacije/" target="_blank" rel="noopener">zavrnirukave.rs</a></span>
    <span class="stamp" id="stamp"></span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const COLORS = {
  'Beograd':'#e53935','Vojvodina':'#1e88e5','Centralna Srbija':'#43a047',
  'Zapadna Srbija':'#fb8c00','Istočna Srbija':'#8e24aa','Južna Srbija':'#00897b'
};
const REGIONS = Object.keys(COLORS);
const STATIC_URL = './locations.json';
const LIVE_URL = 'https://zavrnirukave.rs/wp-json/wp/v2/pages?slug=prijavljene-lokacije&_fields=modified_gmt,content';

function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const map = L.map('map',{preferCanvas:true}).setView([44.05,20.8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);

const clusters = {};
const counts = {};
for (const r of REGIONS) {
  const color = COLORS[r];
  clusters[r] = L.markerClusterGroup({
    chunkedLoading:true,
    iconCreateFunction: cluster => L.divIcon({
      html:`<div style="background:${color};color:#fff;border-radius:50%;
        width:36px;height:36px;display:flex;align-items:center;justify-content:center;
        font-weight:600;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">${cluster.getChildCount()}</div>`,
      className:'',iconSize:[36,36]
    })
  });
  counts[r]=0;
}

function pinIcon(color){
  return L.divIcon({
    className:'',
    html:`<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
    iconSize:[18,18],iconAnchor:[9,9]
  });
}

function popupHtml(l){
  return `<div class="pop">
    <b>${escHtml(l.name||'(bez naziva)')}</b>
    <div>${escHtml(l.city)}</div>
    <div class="small">Lider: ${escHtml(l.leader||'-')}</div>
    ${l.team?`<div class="small">Tim: ${escHtml(l.team)}</div>`:''}
    <div class="small">${l.lat.toFixed(5)}, ${l.lon.toFixed(5)}</div>
    <div class="small" style="margin-top:4px"><a target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${l.lat},${l.lon}">Google Maps &#8599;</a></div>
  </div>`;
}

function render(locations){
  for (const r of REGIONS) {
    clusters[r].clearLayers();
    counts[r] = 0;
  }
  for (const l of locations) {
    if (!clusters[l.r]) continue;
    const m = L.marker([l.lat,l.lon],{icon:pinIcon(COLORS[l.r])});
    m.bindPopup(popupHtml(l));
    clusters[l.r].addLayer(m);
    counts[l.r]++;
  }
  for (const r of REGIONS) {
    if (!map.hasLayer(clusters[r])) clusters[r].addTo(map);
  }
  document.getElementById('count').textContent = locations.length;
  rebuildFilters();
}

function rebuildFilters(){
  const root = document.getElementById('filters');
  root.replaceChildren();
  for (const r of REGIONS) {
    const row = document.createElement('label');
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.checked = map.hasLayer(clusters[r]);
    const dot = document.createElement('span');
    dot.className='dot'; dot.style.background=COLORS[r];
    const label = document.createElement('span'); label.textContent = r;
    const num = document.createElement('span');
    num.style.cssText = 'margin-left:auto;color:#888'; num.textContent = counts[r];
    row.append(cb, dot, label, num);
    root.appendChild(row);
    cb.addEventListener('change', e => {
      if (e.target.checked) clusters[r].addTo(map);
      else map.removeLayer(clusters[r]);
    });
  }
}

function setChip(kind, text, title){
  const el = document.getElementById('chip');
  el.className = 'chip ' + kind;
  el.textContent = text;
  if (title) el.title = title;
}

function setStamp(modifiedGmt){
  if (!modifiedGmt) { document.getElementById('stamp').textContent = ''; return; }
  const d = new Date(modifiedGmt + 'Z');
  document.getElementById('stamp').textContent = 'aktualno: ' + d.toLocaleString('sr-RS');
}

function parseLiveHtml(html){
  const REGSET = new Set(REGIONS);
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = [];
  let region = null;
  for (const el of doc.querySelectorAll('h1,h2,h3,h4,table')) {
    if (el.tagName !== 'TABLE') {
      const t = el.textContent.trim();
      if (REGSET.has(t)) region = t;
      continue;
    }
    if (!region) continue;
    const rows = el.querySelectorAll('tr');
    if (rows.length < 2) continue;
    const headers = [...rows[0].querySelectorAll('th,td')].map(c => c.textContent.trim());
    const iName = headers.indexOf('Ime lokacije');
    const iCity = headers.indexOf('Grad / mesto');
    const iLead = headers.indexOf('Ime lidera lokacije');
    const iTeam = headers.indexOf('Tim');
    for (let i = 1; i < rows.length; i++) {
      const tr = rows[i];
      let coords = null;
      for (const a of tr.querySelectorAll('a')) {
        const m = (a.getAttribute('href')||'').match(/query=([-\d.]+),([-\d.]+)/);
        if (m) { coords = m; break; }
      }
      if (!coords) continue;
      const cells = [...tr.querySelectorAll('td,th')].map(c => c.textContent.trim());
      out.push({
        r: region,
        lat: parseFloat(coords[1]), lon: parseFloat(coords[2]),
        name: iName>=0 ? cells[iName]||'' : '',
        city: iCity>=0 ? cells[iCity]||'' : '',
        leader: iLead>=0 ? cells[iLead]||'' : '',
        team: iTeam>=0 ? cells[iTeam]||'' : ''
      });
    }
  }
  return out;
}

let currentModified = null;

async function loadStatic(){
  const r = await fetch(STATIC_URL, {cache:'no-cache'});
  if (!r.ok) throw new Error('static '+r.status);
  return r.json();
}

async function loadLive(){
  const r = await fetch(LIVE_URL, {cache:'no-cache'});
  if (!r.ok) throw new Error('live '+r.status);
  const arr = await r.json();
  if (!Array.isArray(arr) || !arr[0]) throw new Error('live shape');
  const page = arr[0];
  return {
    modified_gmt: page.modified_gmt,
    locations: parseLiveHtml(page.content.rendered)
  };
}

async function refresh(){
  setChip('loading','provera…','Provera izvora…');
  try {
    const live = await loadLive();
    if (!live.locations.length) throw new Error('parsed 0');
    if (live.modified_gmt !== currentModified) {
      render(live.locations);
      currentModified = live.modified_gmt;
      setStamp(live.modified_gmt);
      setChip('live','live · ažurirano','Podaci sveže preuzeti sa zavrnirukave.rs');
    } else {
      setChip('live','live · u sinhronizaciji','Statički podaci se poklapaju sa izvorom');
    }
  } catch (e) {
    console.warn('live refresh failed:', e);
    setChip('err','offline','Izvor nedostupan, prikazan keš');
  }
}

(async () => {
  try {
    const stat = await loadStatic();
    render(stat.locations);
    currentModified = stat.modified_gmt;
    setStamp(stat.modified_gmt);
    setChip('cache','keš · provera live…','Učitan keš, provera izvora u toku…');
  } catch (e) {
    setChip('err','greška učitavanja','locations.json nije dostupan');
    return;
  }
  refresh();
})();

document.getElementById('chip').addEventListener('click', refresh);
</script>
</body>
</html>
