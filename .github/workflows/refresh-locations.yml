name: refresh-locations

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-locations
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet beautifulsoup4

      - name: Refresh locations.json
        run: python scripts/refresh.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- locations.json; then
            echo "no change"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add locations.json
          MOD=$(python -c "import json; print(json.load(open('locations.json'))['modified_gmt'])")
          CNT=$(python -c "import json; print(json.load(open('locations.json'))['count'])")
          git commit -m "data: refresh locations.json (modified_gmt=${MOD}, count=${CNT})"
          git push
